components:
  schemas:
    PurchaseReceiptCartRequest:
      properties:
        total:
          type: integer
          exclusiveMinimum: 0
          title: Total
          description: Total cart amount
        items:
          items:
            $ref: '#/components/schemas/FiscalizationCartItemRequest'
          type: array
          minItems: 1
          title: Items
          description: Detailed list of items or services in the customer's cart
      type: object
      required:
        - total
        - items
      title: PurchaseReceiptCartRequest
    PurchaseReceiptResponse:
      properties:
        operationId:
          type: string
          format: uuid
          title: Operationid
          description: Operation ID on the Uzum Checkout side
      type: object
      required:
        - operationId
      title: PurchaseReceiptResponse
    ApiResponse_PurchaseReceiptResponse_:
      properties:
        errorCode:
          $ref: '#/components/schemas/ErrorCode'
        message:
          anyOf:
            - type: string
            - type: 'null'
          title: Message
        result:
          $ref: '#/components/schemas/PurchaseReceiptResponse'
      type: object
      required:
        - errorCode
      title: ApiResponse[PurchaseReceiptResponse]
    PurchaseReceiptRequest:
      properties:
        orderId:
          type: string
          format: uuid
          title: Orderid
          description: Order identifier
        cart:
          allOf:
            - $ref: '#/components/schemas/PurchaseReceiptCartRequest'
          description: Cart data for purchase receipt fiscalization
      type: object
      required:
        - orderId
        - cart
      title: PurchaseReceiptRequest
    UnbindCardCommand:
      title: UnbindCardCommand
      required:
        - bindingId
      type: object
      properties:
        bindingId:
          title: Binding Id
          maxLength: 255
          type: string
          description: Binding ID
    ApiResponse_UnBindCardResponse_:
      title: ApiResponse[UnBindCardResponse]
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          title: Error code
          type: string
          description: Error code
        message:
          title: Message
          type: string
    AcquiringCallbackData:
      title: AcquiringCallbackData
      required:
        - orderId
        - operationState
        - operationType
        - orderNumber
      type: object
      properties:
        orderId:
          title: Orderid
          type: string
          description: Order ID on the Checkout side
        operationState:
          allOf:
            - $ref: '#/components/schemas/CallbackOperationState'
          description: Operation status
        operationType:
          allOf:
            - $ref: '#/components/schemas/PaymentOperationType'
          description: Operation type
        cardType:
          title: Card Type
          description: |
            Type of card used for the transaction:
            * `1` – Corporate card  
            * `2` – Personal card
          type: integer
          enum:
            - 1
            - 2
        merchantOperationId:
          title: Merchantoperationid
          type: string
          description: |-
            Operation ID on the merchant's side, will be returned if it was
             passed when initializing the operation
        orderNumber:
          title: Ordernumber
          type: string
          description: Order ID on the merchant's side
        rrn:
          title: Rrn
          type: string
          description: Unique identifier of the banking transaction
    ApiResponse_GetCertificateResponse_:
      title: ApiResponse[GetCertificateResponse]
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          $ref: '#/components/schemas/ErrorCode'
        message:
          title: Message
          type: string
        result:
          $ref: '#/components/schemas/GetCertificateResponse'
    GetCertificateResponse:
      title: GetCertificateResponse
      required:
        - certificate
        - fingerprint
      type: object
      properties:
        certificate:
          title: Certificate
          type: string
          description: Certificate body (base64)
        fingerprint:
          title: Fingerprint
          type: string
          description: Certificate fingerprint (base64)
    AcquiringPaymentParams:
      title: AcquiringPaymentParams
      required:
        - payType
      type: object
      properties:
        operationType:
          title: Operationtype
          enum:
            - PAYMENT
          type: string
          description: Operation type PAYMENT - payment by card
          default: PAYMENT
        payType:
          allOf:
            - $ref: '#/components/schemas/PayType'
          description: Payment type (one_step/two_step)
        phoneNumber:
          title: Phonenumber
          type: string
          description: Phone number only for topping up mobile balance
        force3ds:
          title: Force3Ds
          type: boolean
          description: Forcing payment to 3DS
    AcquiringStatus:
      title: AcquiringStatus
      enum:
        - REGISTERED
        - AUTHORIZED
        - TOP_UP_COMPLETED
        - COMPLETED
        - REFUNDED
        - REVERSED
        - DECLINED
      type: string
      description: An enumeration.
    ApiResponse_Complete2SPResponse_:
      title: ApiResponse[Complete2SPResponse]
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          $ref: '#/components/schemas/ErrorCode'
        message:
          title: Message
