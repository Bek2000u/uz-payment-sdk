components:
  headers:
    X-Custom-Header:
      description: Пример пользовательского заголовка
      schema:
        type: string
    X-Another-Header:
      description: Ещё один пример пользовательского заголовка
      schema:
        type: string
  schemas:
    PurchaseReceiptResponse:
      properties:
        operationId:
          type: string
          format: uuid
          title: Operationid
          description: ID операции на стороне Uzum Checkout
      type: object
      required:
        - operationId
      title: PurchaseReceiptResponse
    ApiResponse_PurchaseReceiptResponse_:
      properties:
        errorCode:
          $ref: '#/components/schemas/ErrorCode'
        message:
          anyOf:
            - type: string
            - type: 'null'
          title: Message
        result:
          $ref: '#/components/schemas/PurchaseReceiptResponse'
      type: object
      required:
        - errorCode
      title: ApiResponse[PurchaseReceiptResponse]
    PurchaseReceiptCartRequest:
      properties:
        total:
          type: integer
          exclusiveMinimum: 0
          title: Total
          description: Общая стоимость корзины
        items:
          items:
            $ref: '#/components/schemas/FiscalizationCartItemRequest'
          type: array
          minItems: 1
          title: Items
          description: Детальный перечень товаров или услуг, включенных в корзину клиента
      type: object
      required:
        - total
        - items
      title: PurchaseReceiptCartRequest
    PurchaseReceiptRequest:
      properties:
        orderId:
          type: string
          format: uuid
          title: Orderid
          description: Идентификатор заказа
        cart:
          allOf:
            - $ref: '#/components/schemas/PurchaseReceiptCartRequest'
          description: Корзина для фискализации чека покупки
      type: object
      required:
        - orderId
        - cart
      title: PurchaseReceiptRequest
    UnbindCardCommand:
      title: UnbindCardCommand
      required:
        - bindingId
      type: object
      properties:
        bindingId:
          title: Binding Id
          maxLength: 255
          type: string
          description: Идентификатор привязки
    ApiResponse_UnBindCardResponse_:
      title: ApiResponse[UnBindCardResponse]
      required:
        - errorCode
      type: object
      properties:
        errorCode:
          title: Error code
          type: string
          description: Код ошибки
        message:
          title: Message
          type: string
    APIDataFor3DS:
      title: APIDataFor3DS
      type: object
      properties:
        acsUrl:
          title: Acsurl
          type: string
          description: AcsUrl для прохождения 3DS, если пришел, то открываем форму 3DS
        paReq:
          title: Pareq
          type: string
          description: >-
            Сообщение PAReq (base64), параметр этого платежного запроса. Он
            содержит всю важную информацию о платеже;
        termUrl:
          title: Termurl
          type: string
          description: URL терминала
    AcquiringCallbackData:
      title: AcquiringCallbackData
      required:
        - orderId
        - operationState
        - operationType
        - orderNumber
      type: object
      properties:
        orderId:
          title: Orderid
          type: string
          description: Уникальный идентификатор платежа.
        operationState:
          allOf:
            - $ref: '#/components/schemas/CallbackOperationState'
          description: Статус операции
        operationType:
          title: Operationtype
          enum:
            - AUTHORIZE
            - COMPLETE
            - REFUND
            - REVERSE
            - TOP_UP_COMPLETED
          type: string
          description: Тип операции
        cardType:
          title: Card Type
          description: |
            Тип карты, используемой для транзакции:
            * `1` – Корпоративная карта  
            * `2` – Личная карта
          type: integer
          enum:
            - 1
            - 2
        merchantOperationId:
          title: Merchantoperationid
          type: string
          description: >-
            Уникальный идентификатор операции, заданный на вашей стороне, будет
            возвращен, если он был указан при инициализации операции.
        orderNumber:
          title: Ordernumber
          type: string
          description: Уникальный идентификатор заказа, присвоенный на вашей стороне.
        rrn:
          title: Rrn
          type: string
          description: Уникальный идентификатор банковской операции
        bindingId:
          title: Bindingid
          type: string
          description: Идентификатор созданной связки при проведении операции
    AcquiringPaymentParams:
      title: AcquiringPaymentParams
      required:
        - payType
      type: object
      properties:
        operationType:
          title: Operationtype
          enum:
            - PAYMENT
          type: string
          description: Тип операции. `"PAYMENT"` -  оплата картой.
          default: PAYMENT
        payType:
          allOf:
            - $ref: '#/components/schemas/PayType'
          description: >-
            Тип платежа: `"ONE_STEP"` для одностадийного и `"TWO_STEP"` для
            двухстадийного.
        phoneNumber:
          title: Phonenumber
          type: string
          description: >-
            Номер телефона клиента в международном формате, например,
            `'998940202903'`.


            Допускается использование номеров из России и Казахстана, как
            `'79991116921'`, однако при их использовании в рамках
            автофискализации кэшбэк не начисляется.
        force3ds:
          title: Force3Ds
          type: boolean
          description: Принудительная отправка платежа на 3DS аутентификацию.
    ApiResponse_Complete2SPResponse_:
      title: ApiResponse[Complete2SPResponse]
      required:
        - errorCode
