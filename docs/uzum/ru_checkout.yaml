      5000 | Internal Error
  - name: Post Messages
    description: >
      JSON объект будет состоять из трех обязательных полей: `status`, `action`
      и `errorCode`. Кроме того, может присутствовать необязательное поле
      `payment_id`.


      - Поле `status` будет содержать одно из трех возможных значений:
      `SUCCESS`, `CANCEL` или `ERROR`. Это показывает, на каком состоянии
      пользователь завершил работу. Например, если пользователь успешно завершил
      работу, значение поля `status` будет `SUCCESS`.


      - Поле `action` будет иметь только одно возможное значение - `close`. Это
      означает, что после того, как статус будет отправлен, родительский
      компонент должен закрыть iframe или webview.


      - Поле `errorCode` будет содержать числовой идентификатор ошибки.


      Пример JSON объекта:

      ```

      {
        "status": "SUCCESS",
        "action": "close",
        "payment_id": "1234567890",
        "errorCode": 0
      }

      ```

      Следовательно, родительский компонент, получающий это сообщение, должен
      проверить значение поля `status` и выполнить соответствующие действия в
      зависимости от этого статуса, после чего закрыть `iframe` или `webview`.
