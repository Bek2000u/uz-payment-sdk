    ---


    # Начало работы


    Чтобы интеграция с API **Uzum Checkout** прошла быстро и без ошибок,
    выполните следующие шаги:


    1. Настройте [фискализацию](#section/Fiskalizaciya).  


    3. Изучите ключевые процессы:
        - [Одностадийный платёж с автофискализацией](#section/Opisanie-procesov/Odnostadijnyj-platezh-s-avtofiskalizaciej)  
        - [Одностадийный платёж без автофискализации](#section/Opisanie-procesov/Odnostadijnyj-platezh-bez-avtofiskalizacii)  
        - [Управление платёжными картами: привязка, оплата, деактивация](#section/Opisanie-procesov/Processy-upravleniya-platyozhnymi-kartami:-privyazka-oplata-deaktivaciya)  
        - [Оплата по номеру карты без открытия формы (с шифрованием данных)](#section/Opisanie-procesov/Oplata-po-nomeru-karty-bez-otkrytiya-formy-Uzum-Checkout-s-shifrovaniem-dannyh)  
        - [Возвраты платежей](#section/Opisanie-procesov/Vozvrat-platezhej)  
        - [Фискализация чека покупки на основании авансового](#tag/Vspomogatelnye-metody/operation/purchase_receipt_api_v1_acquiring_purchaseReceipt_post)

    4. Проведите тестовую интеграцию используя [тестовую среду и тестовые
    карты](#tag/Testirovanie).


    5. Получите доступ к рабочей среде и переведите интеграцию в эксплуатацию.


    ---


    # Аутентификация


    Uzum Checkout использует **аутентификацию по API-ключу** — простой и
    безопасный метод авторизации.


    Наша команда выдаст вам секретный **API-ключ**, который необходимо указывать
    в каждом запросе в HTTP-заголовке **X-API-Key**.


    Если ключ действителен и совпадает с ключом в нашей системе, запрос
    считается авторизованным.


    ## Обязательные HTTP-заголовки


    **X-Terminal-Id** — идентификатор терминала, используемого для обработки
    транзакций. Мы присваиваем и передаем этот идентификатор каждому партнеру.


    **X-API-Key** — уникальный API-ключ, который используется для авторизации
    запросов. Мы присваиваем и передаем его каждому партнеру.


    **Content-Language** — язык формы оплаты. Возможные значения: `"ru-RU"`,
    `"uz-UZ"`, `"en-EN"`.


    ---


    # Одностадийный платеж


    **Одностадийный платеж** – это платеж в один этап, при котором **авторизация
    карты

    и списание денежных средств клиента происходят практически одновременно**. 


    ***Например***, при онлайн-покупке билетов в кино, **оплата происходит

    непосредственно после ввода платежных данных**. После оплаты, клиент получит

    билеты в кратчайшие сроки, учитывая время, необходимое на обработку данных

    со стороны сервиса продажи билетов.



    После проведения одностадийного платежа вы **можете осуществить как полный,

    так и частичный возврат средств** клиенту.



    При одностадийном платеже вы **можете использовать
    [автофискализацию](#section/Fiskalizaciya/Fiskalizaciya-pri-odnostadijnom-platezhe)**.
    Мы

    берем всю работу по фискализации на себя; вам не нужно самостоятельно

    передавать данные в сервис фискализации.


    # Фискализация


    Фискализация — это обязательный процесс, наложенный законодательством,

    который включает в себя регистрацию платежных операций и выдачу фискальных

    чеков.


    Вы можете воспользоваться **автоматической фискализацией**. **Изначально она
    выключена**, чтобы ее включить - вам нужно **сообщить об этом  менеджеру со
    стороны Uzum Bank**.


    - **При включенной** услуге автофискализации вам необходимо передавать
    информацию

    о корзине в метод `/payment/register`, включая сведения о каждом товаре, а

    также его ИКПУ, код упаковки и % ставки НДС. Cм. раздел [ИКПУ и Код
    упаковки](#section/Fiskalizaciya/IKPU-i-Kod-upakovki).


    - **При выключенной** услуге автофискализации вам необходимо передавать
    данные в

    сервис фискализации самостоятельно. Вы можете воспользоваться <a

    href='https://developer.uzumbank.uz/fiscalization' target='_blank'>нашим

    сервисом фискализации</a>.


    ## ИКПУ и Код упаковки



    Для проведения фискализации вам необходимо знать ИКПУ и код упаковки товара.

    ИКПУ и код упаковки можно найти на сайте Единого Электронного Национального

    Каталога Продукции: https://tasnif.soliq.uz/ 



    1. Перейдите на сайт https://tasnif.soliq.uz//


    1. На главной странице обратите внимание на поисковую строку и выберите

    подходящий метод поиска. Чаще всего оптимальным вариантом является 'Поиск по

    тексту'.



    <a href='/img/fiscalization/ikpu-1.png' target='_blank'><img

    src='/img/fiscalization/ikpu-1.png'/></a>.



    3. Введите в поисковую строку ключевые слова, например, "электрический

    чайник". Если ваш товар не появился в списке, попробуйте использовать более

    общие термины, например, "чайник".



    <a href='/img/fiscalization/ikpu-2.png' target='_blank'><img

    src='/img/fiscalization/ikpu-2.png'/></a>.



    4. Перейдите на страницу товара, который наиболее соответствует вашему.


    5. ИКПУ товара будет указан в верхней части страницы.



    <a href='/img/fiscalization/ikpu-3.png' target='_blank'><img

    src='/img/fiscalization/ikpu-3.png'/></a>.



    6. В разделе "Условная единица" найдите код. Варианты могут быть разные,

    например, "шт" для штучных товаров, “грамм” для весовых товаров и “услуга”

    (сум) для услуг. Если возникли трудности в выборе правильной условной

    единицы, обратитесь к вашему отделу бухгалтерии за помощью.


