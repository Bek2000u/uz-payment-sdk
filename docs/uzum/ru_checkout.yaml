    ## Одностадийный платеж с автофискализацией


    Для осуществления одностадийного платежа с автофискализацией используется

    метод регистрации платежа `/payment/register`.


    В запросе следует указать тип платежа `payType="ONE_STEP"` и передать

    информацию о товарах в корзине в объекте `cart`. Эти данные необходимы для

    автоматической фискализации чека, основанной на переданных товарах.


    <a href='/img/checkout/checkout-one-step-auto.png' target='_blank'><img

    src='/img/checkout/checkout-one-step-auto.png' style="display: block;
    margin: 0 auto; max-width:70%; height: auto;"/></a>.


    1. Клиент начинает процесс оплаты на вашей платформе нажав на кнопку
    “Оплатить”. 


    2. Вы отправляете запрос в Uzum Checkout для регистрации

    одностадийного платежа методом [/payment/register]() с параметром
    `payType="ONE_STEP"`

    включая детали корзины в объекте `cart` для создания фискального чека.  


    3. Мы регистрируем платеж, отправляем вам уникальный

    идентификатор заказа `orderId` и URL платежной страницы.  


    4. Вы перенаправляете клиента на платежную страницу Uzum Checkout используя
    URL платежной страницы.


    5. Клиент вводит данные карты и подтверждает оплату.


    6. Мы проводим операцию списания.


    7. Мы фискализируем чек.


    8. Мы отправляем вам callback с информацией о выполнении платежа.


    9. Вы подтверждаете получение колбэка.


    10. Мы уведомляем клиента об успешном проведении платежа и перенаправляем
    его на вашу страницу.



    ## Одностадийный платеж без автофискализации



    Для осуществления одностадийного платежа без автофискализации используется

    метод регистрации платежа `/payment/register` с типом платежа

    `payType="ONE_STEP"`. 



    Передавать информацию о товарах в корзине не нужно. 



    <a href='/img/checkout/checkout-one-step-self.png' target='_blank'><img

    src='/img/checkout/checkout-one-step-self.png' style="display: block;
    margin: 0 auto; max-width:70%; height: auto;"/></a>.



    1. Клиент начинает процесс оплаты на вашей платформе нажав на кнопку

    “Оплатить”.


    2. Вы отправляете запрос в Uzum Checkout для регистрации

    одностадийного платежа без автофискализации [/payment/register](#) с
    параметром

    `payType=”ONE_STEP”`.


    3. Мы регистрируем платеж, отправляем вам уникальный

    идентификатор заказа `orderId` и URL платежной страницы.


    4. Вы перенаправляете клиента на платежную страницу Uzum Checkout используя
    URL платежной страницы.


    5. Клиент вводит данные карты/выбирает привязку и подтверждает оплату.


    6. После подтверждения оплаты, мы проводим списание средств.


    7. Мы отправляем callback с информацией о выполнении платежа.


    8. Вы подтверждаете получение callback.


    9. Мы уведомляем клиента об успешном проведении платежа и перенаправляет его
    на вашу страницу.


    ### Привязка карты 


    Привязку карты можно осуществить с помощью метода `/payment/register`. При

    вызове этого метода, необходимо передать `operationType="BINDING"`. 


    <a href='/img/checkout/checkout-bind-card.png' target='_blank'><img

    src='/img/checkout/checkout-bind-card.png' style="display: block; margin: 0
    auto; max-width:70%; height: auto;"/></a>.


    1. Клиент добавялет карту.


    2. Вы отправляете запрос на привязку карты методом [/payment/register](#) с
    `operationType="BINDING"`. 


    3. Мы обрабатываем запрос и отправляем вам URL, ведущий клиента на

    форму для ввода данных карты.


    4. Вы предоставляете клиенту форму для ввода данных карты. 


    5. Клиент вводит данные карты и подтверждает их.


    6. Мы создаем привязку. В процессе создания привязки, Uzum Checkout временно
    захолдирует

    небольшую сумму на карте клиента для проверки ее работоспособности и

    сразу же вернет эти средства.


    7. По завершении процесса привязки, мы отправим вам callback с информацией о

    результате операции.


    8. Вы подтверждаете получение callback.


    9. Мы уведомляем клиента об успешной привязке и перенаправлям его на вашу
    страницу.



    #### Альтернативный способ сохранения карты


    Ваш клиент также может самостоятельно сохранить карту при совершении

    покупки, установив флаг "Запомнить карту" на форме оплаты. 



    В этом случае описанный выше процесс сохранения карты не требуется.



    <a  href='/img/checkout/bind-card-app.png' target='_blank'><img

    style="display:block; margin: auto; max-width: 400px"

    src='/img/checkout/bind-card-app.png'/></a>.



    ### Оплата привязкой


    Клиент может выбрать одну из привязанных карт и оплатить ей заказ.


    <a href='/img/checkout/checkout-pay-with-bind-card.png' target='_blank'><img

    src='/img/checkout/checkout-pay-with-bind-card.png' style="display: block;
    margin: 0 auto; max-width:70%; height: auto;"/></a>.


    1. Клиент начинает процесс оплаты на вашей платформе нажав на кнопку
    “Оплатить”. 


    2. Вы отправляете запрос для получения списка привязок клиента.


    3. Мы передаем вам список привязок клиента. 


    4. Вы предоставляете клиенту список привязок.


    5. Клиент выбирает нужную привязку для оплаты и инициирует оплату.


    6. Вы отправляет запрос на регистрацию платежа методом
    [/payment/register](#). Если у вас активирована

    автофискализация, необходимо передавать данные о корзине для одностадийных

    платежей.


    7. Мы регистрируем платеж, отправляем вам уникальный

    идентификатор заказа `orderId`. 


    8. Вы отправляете запрос `/payment/merchantPay` с `type="bind"` и указанием
    идентификатора выбранной привязки для проведения

    платежа.


    9. Мы обрабатываем платеж.


    10. Мы отправляем вам callback с информацией о

    результате операции.


    11. Вы подтверждаете получение callback.


    12. Вы уведомляеете клиента об успешном проведении платежа.




    ### Деактивация карты


    Клиент может отвязать платёжную карту от системы.


    <a href='/img/checkout/unBindCard.png' target='_blank'><img

    src='/img/checkout/unBindCard.png'/></a>.


    1. Клиент заходит на страницу управления привязками карт в вашем приложении.


    1. Вы обращаетесь в Uzum Checkout с запросом `/api/v1/acquiring/getBindings`
    для получения списка привязок карт клиента.


    1. Uzum Checkout обрабатывает запрос и передает вам список привязок карт
    клиента.


    1. Вы предоставляете клиенту полученный список привязок через ваш
    пользовательский интерфейс.


    1. Клиент просматривает список, выбирает карту для деактивации и инициирует
    процесс деактивации.


    1. Вы отправляете запрос на деактивацию карты в Uzum Checkout, используя
    метод `/api/v1/acquiring/unBindCard`, указывая ID привязки.


    1. Uzum Checkout обрабатывает запрос на деактивацию и отправляет вам ответ с
    информацией о результате операции.    


    ## Оплата по номеру карты без открытия формы Uzum Checkout с шифрованием
    данных


    Оплата по номеру карты с шифрованием данных доступна только после

    прохождения сертификации PCI DSS.



    Для оплаты по номеру карты без открытия формы Uzum Checkout необходимо

    отправить запрос на регистрацию одностадийного через `/payment/register`.


    Если у вас включена автофискализация, в одностадийных

    платежах необходимо передавать данные о корзине.


    <a href='/img/checkout/checkout-pay-card-no-form.png' target='_blank'><img

    src='/img/checkout/checkout-pay-card-no-form.png' style="display: block;
    margin: 0 auto; max-width:70%; height: auto;"/></a>.


    1. Вы региструете платежа методом `/payment/register`.


    2. Мы регистрируем платеж и возвращаем `orderId`.


    3. Вы запрашиваете сертификат шифрования и fingerprint с помощью метода

    [/acquiring/getMerchantCertificate](#tag/Platezh-bez-otkrytiya-formy-(Back-to-back-Payment)/operation/get_merchant_certificate_api_v1_acquiring_getMerchantCertificate_post).


    4. Мы генерируем и возвращаем сертификат + fingerprint.


    5. Вы отправляете запрос на проведение платежа по номеру карты при помощи
    метода

    [payment/merchantPay](#tag/Platezh-bez-otkrytiya-formy-(Back-to-back-Payment)/operation/merchant_pay_api_v1_payment_merchantPay_post),
    указывая тип (type = card) и передавая зашифрованное

    JSON-сообщение с данными карты.


    6. Мы проводим платеж.


    7. Мы отправляем вам callback с информацией о выполнении платежа.


    8. Вы подтверждаете получение callback.


    ## Возврат платежей


    После успешного завершения платежа, когда статус транзакции обновился до

    'COMPLETED', у вас появляется возможность осуществить возврат средств

    клиенту. 



    ### Возврат одностадийного платежа с автофискализацией



    <a href='/img/checkout/checkout-auto-refund.png' target='_blank'><img

    src='/img/checkout/checkout-auto-refund.png' style="display: block; margin:
    0 auto; max-width:60%; height: auto;"/></a>.



    1. Вы отправляете запрос на возврат платежа методом [/acquiring/refund](#);
    указываете сумму возврата и

    данные о возвращаемых товарах в объекте `cart`. 


    2. Мы подтверждаем получение запроса.  


    3. Мы проводим возврат платежа.


    4. Мы фискализацируем возвратный чека.


    5. Мы отправляем вам callback с информацией о выполнении

    возврата и о создании чека.


    6. Вы подтверждаете получение callback.







    ### Возврат одностадийного платежа без автофискализации



    <a href='/img/checkout/checkout-self-refund.png' target='_blank'><img

    src='/img/checkout/checkout-self-refund.png' style="display: block; margin:
    0 auto; max-width:60%; height: auto;"/></a>.



    1. Вы отправляете запрос на возврат платежа методом [/acquiring/refund](#);
    указываете сумму возврата. 


    2. Мы подтверждаем получение запроса.  


    3. Мы проводим возврат платежа.
        
    4. Мы отправляем вам callback с информацией о выполнении

    возврата и о создании чека.


    5. Вы подтверждаете получение callback.


    ## Фискализация чека покупки на основании авансового


    Метод
    [/acquiring/purchaseReceipt](#tag/Vspomogatelnye-metody/operation/purchase_receipt_api_v1_acquiring_purchaseReceipt_post)
    доступен только, если необходимо генерировать сначала авансовый чек с типом
    PREPAID, а затем чек продажи.


    <a href='/img/checkout/checkout-fiscalization-paid.png' target='_blank'><img

    src='/img/checkout/checkout-fiscalization-paid.png' style="display: block;
    margin: 0 auto; max-width:60%; height: auto;"/></a>.


    1. Вы отправляете запрос на фискализацию чека покупки методом
    [/acquiring/purchaseReceipt](#tag/Vspomogatelnye-metody/operation/purchase_receipt_api_v1_acquiring_purchaseReceipt_post). 


    2. Мы подтверждаем получение запроса.  


    3. Мы генерируем чек продажи.
        
    4. Мы отправляем вам callback с информацией о создании чека.


    5. Вы подтверждаете получение callback.


    ---


    # Статусная модель


    <a href='/img/checkout/one-step-states.png' target='_blank'><img
    style="display: block; margin: 0 auto; max-width:50%; height: auto;"

    src='/img/checkout/one-step-states.png'/></a>.


    | Статус    |
    Описание                                                                                                   
    |

    |-----------|-------------------------------------------------------------------------------------------------------------|

    | REGISTERED| После вызова API `/register`, была осуществлена успешная
    регистрация платежа в Checkout.                     |

    | COMPLETED | Списание средств с карты клиента было осуществлено успешно.
    Банк выпустивший карту клиента одобрил платеж.  |

    | DECLINED  | Банк выпустивший карту клиента отказал в проведении платежа
    или произошла ошибка при попытке проведения платежа. |

    | REFUNDED  | После вызова API `/refund`, был успешно осуществлен возврат
    средств на карту клиента.                        |


    ---


    # Callbacks


    Callbacks или “колбеки” являются неотъемлемой частью взаимодействия нашего
    API с вашим сервером. Они позволяют вашему сервису получать уведомления о
    различных событиях и реагировать на них в реальном времени. 


    Колбеки находятся в конце описания API методов. Каждый колбек можно
    развернуть и изучить его структуру.


    <a href='/img/checkout/callbacks.png' target='_blank'><img style="display:
    block; margin: 1rem auto; max-width:80%; height: auto;"

    src='/img/checkout/callbacks.png'/></a>


    Ваш сервер должен обработать полученный колбек запрос и вернуть статус 200
    OK. Это подтверждает нашему серверу, что уведомление было получено и
    обработано. 


    Если наш сервер не получит подтверждения, он отправит еще один колбек.
    Максимум 5 раз.
