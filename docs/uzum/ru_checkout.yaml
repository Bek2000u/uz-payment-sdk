tags:
  - name: Тестирование
    description: |

      Для тестирования доступны карты HUMO и Uzcard.
      - **HUMO**: `9860 0901 0121 9724`, *exp* `10/26`, *3-DS:* `777777`
      - **UzCard**: `8600 3129 2957 7175`, *exp* `09/26`, *3-DS:* `777777`
  - name: Коды ошибок
    description: >-
      Код ошибки | Описание

      --- | ----

      0  | Операция выполнена успешно

      <b>1xxx</b> | <b>Ошибки аутентификации</b>

      1001 | Недействительный токен UzumId

      1006 | Ошибка доступа: недостаточно прав для выполнения операции

      <b>2xxx</b> | <b>Ошибки в данных API-запроса</b>

      2000 | Неверный формат данных: ValidationError

      <b>3xxx</b> | <b>Ошибки при обработке платежа</b>

      3000 | Некорректный статус платежа: выполнение данной операции невозможно
      в текущем статусе

      3001 | Терминал с указанным terminalId не найден

      3002 | Некорректная сумма, валюта или комиссия

      3003 | Некорректные параметры корзины товаров

      3004 | Терминал не поддерживает этот тип платежа (ONE_STEP / TWO_STEP)

      3005 | Платеж с указанным paymentId не найден

      3006 | Привязка с указанным bindingId не найдена

      3007 | Некорректные реквизиты карты. Неверный код MCC

      3008 | Недостаточно средств на счёте

      3009 | Отклонено антифрод-системой

      3010 | Оплата по данной карте невозможна из-за санкций или других
      ограничений

      3011 | Операция отклонена банком-эмитентом

      3012 | Превышен лимит на количество транзакций

      3013 | Сумма платежа превышает установленный лимит

      3014 | MCC отсутствует в списке разрешённых

      3015 | Транзакции по картам указанной платёжной системы запрещены

      3016 | Ошибка дешифрования: сертификат не найден или AES токен не найден

      3019 | Некорректная сумма для отмены платежа

      3020 | Истёк срок для отмены платежа

      3021 | Некорректная сумма для возврата

      3022 | Истёк срок для возврата

      3023 | Партнёр не найден

      3024 | BIN не найден

      3025 | Шифрование запрещено

      3026 | Ошибка валидации формы платежа

      3027 | Платеж с таким номером заказа уже существует

      3028 | Операция уже существует

      3029 | Время действия платёжных данных истекло

      3030 | Операция COPMPLETE недоступна для одностадийного платежа

      3034 | Одностадийные платежи запрещены

      3035 | Операция не найдена

      3036 | Невозможно выполнить отмену одностадийного платежа

      3037 | На терминале отсутствуют необходимые настройки для проведения
      платежа

      3038 | Невозможно вызвать операцию COMPLETE для BINDING

      3039 | Невозможно вызвать операцию REVERSE для BINDING

      3040 | 3DS не поддерживается

      3041 | Время сессии истекло

      3042 | Пользователь закрыл форму оплаты

      3043 | Невозможно провести платеж. Возможны ошибки на стороне процессинга

      3045 | Не передана корзина для автоматической фискализации возврата

      3046 | Товар в корзине не прошёл валидацию при автоматической фискализации
      возврата

      3047 | Неизвестный тип платежа

      3048 | Партнер не активен

      3049 | Процессинг не отвечает 

      3050 | Ошибка конфигурации МПС/НПС. Неизвестный МПС/НПС

      3051 | Ошибка при прохождении 3DS

      3052 | Ошибка настройки МПС/НПС. Неизвестный МПС/НПС

