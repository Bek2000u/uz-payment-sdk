info:
  title: Uzum Checkout
  version: 1.10.3
  description: >
    **Uzum Checkout** — это REST API для интеграции сайтов и мобильных
    приложений с платежным шлюзом Uzum, который позволяет принимать платежи,
    выполнять фискализацию и управлять возвратами через единый и безопасный
    интерфейс.


    #### ⚙️ Основные возможности

    - Форма оплаты, адаптирующаяся под мобильные устройства и веб

    - Автоматическая фискализация чеков для одностадийных платежей

    - Привязка карт и повторные платежи

    - Платежи без открытия формы (Back-to-back Payment)  

    - Полные и частичные возвраты

    - Сертификация PCI DSS


    #### 💳 Поддерживаемые системы

    Visa · Mastercard · Uzcard · Humo


    #### 🚀 Быстрый старт

    - [Аутентификация через API-ключ](#section/Autentifikaciya)  

    - [Фискализация](#section/Fiskalizaciya) 

    - [Обработка платежей](#tag/Odnostadijnyj-platezh)    

    - [Платёж без открытия формы (Back-to-back
    Payment)](#tag/Platezh-bez-otkrytiya-formy-(Back-to-back-Payment))    

    - [Управление и оплата привязками](#tag/Upravlenie-i-oplata-privyazkami)  

