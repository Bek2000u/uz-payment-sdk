          type: string
          format: uuid
          example: 5c398d7e-76b6-11ee-96da-f3a095c6289d
        paymentSource:
          description: >
            Payment source indicator: UZCARD, HUMO, VISA, MASTERCARD,
            VISA_DOMESTIC, MASTERCARD_DOMESTIC, INSTALLMENT, CASHBACK, ACCOUNT,
            WALLET, VISAUZS, UZUM_DEBIT_VISA.
          type: string
          format: enum
          example: INSTALLMENT
        tariff:
          description: >
            `tariff` is available if the payment source symbol is `INSTALLMENT`;
            otherwise, it is `null`: "003" or "15-0-4" or `null`.
          type: string
          format: string
          example: '003'
        processingReferenceNumber:
          description: >
            Processing reference number. This field is sent only when paying
            with Uzcard, Humo, Visa Uzum Bank, or Visa Kapital Bank cards.
            Otherwise, the value of this field will be `null`.
          type: string
          format: string
          example: '000'
        phone:
          description: |
            Client phone number.
          type: string
          format: string
          example: '998901234567'
        cardType:
          description: >
            Client bank card type (1 - corporate bank card, 2 - private bank
            card).
          type: integer
          format: int32
          example: 2
      required:
        - serviceId
        - timestamp
        - transId
        - paymentSource
        - phone
    Confirm:
      type: object
      properties:
        serviceId:
          description: |
            Service ID for which the payment is being made.
