          type: string
          example: '10013'
      required:
        - errorCode
    ConfirmRequest:
      type: object
      properties:
        serviceId:
          description: |
            Service ID for which the payment is being made.
          type: integer
          format: int64
          example: 101202
        timestamp:
          description: |
