        serviceId:
          description: |
            Service ID for which the payment is being made.
          type: integer
          format: int64
          example: 101202
        transId:
          description: |
            Transaction ID of the payment created in Uzum Bank.
          type: string
          format: uuid
          example: 5c398d7e-76b6-11ee-96da-f3a095c6289d
        status:
          description: |
            Payment transaction status.
          type: string
          enum:
            - CREATED
            - CONFIRMED
            - REVERSED
          example: CONFIRMED
        transTime:
          description: >
            Time of payment transaction creation (Unix timestamp in
            milliseconds).
          type: integer
          format: int64
          example: 1698361458054
        confirmTime:
          description: >
            Time of payment transaction confirmation (Unix timestamp in
            milliseconds).
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
          example: 1698361458054
        reverseTime:
          description: >
            Time of payment transaction cancellation (Unix timestamp in
            milliseconds).
          oneOf:
            - type: integer
              format: int64
            - type: 'null'
          example: null
        data:
          description: >
            User and payment transaction data (can be an empty object).  

            The `data` object consists of key-value pairs. The key name is
            arbitrary, for example: `account` or `fio`.  

            The value is an object with a single property `value` (type
            `string`).
          type: object
          example:
            account:
              value: '123456789'
            fio:
              value: Ivanov Ivan Ivanovich
        amount:
          description: |
            Payment amount in tiyin (the smallest currency unit).
          type: integer
          format: int64
          example: 2500000
      required:
        - serviceId
        - transId
        - status
        - transTime
    StatusError:
