            fio:
              value: Ivanov Ivan Ivanovich
        amount:
          description: |
            Payment amount in tiyin (the smallest currency unit).
          type: integer
          format: int64
          example: 2500000
      required:
        - serviceId
        - transId
        - status
        - transTime
        - amount
    CreateError:
      type: object
      properties:
        serviceId:
          description: |
